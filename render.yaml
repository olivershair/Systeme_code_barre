services:
  - type: web
    name: systeme-code-barre
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn barcode_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: systeme-code-barre.onrender.com,localhost,127.0.0.1
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: systeme-code-barre-db
          property: connectionString

  - type: pserv
    name: systeme-code-barre-db
    env: postgresql
    plan: free
    databaseName: systeme_code_barre
    databaseUser: barcode_user