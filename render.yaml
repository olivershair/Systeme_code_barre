services:
  - type: web
    name: systeme-code-barre
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn barcode_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: systeme-code-barre.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@systeme-code-barre.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: systeme-code-barre-db
          property: connectionString

  - type: pserv
    name: systeme-code-barre-db
    env: postgresql
    plan: free
    databaseName: systeme_code_barre
    databaseUser: barcode_user