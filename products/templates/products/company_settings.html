{% extends 'products/base.html' %}

{% block title %}Paramètres Entreprise{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="bi bi-gear"></i> Paramètres de l'Entreprise</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="{{ form.name.id_for_label }}" class="form-label">Nom de l'Entreprise</label>
                        {{ form.name }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="{{ form.logo.id_for_label }}" class="form-label">Logo</label>
                        {{ form.logo }}
                        <div class="form-text">Format recommandé: PNG ou JPG, max 2MB</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="{{ form.phone_number_1.id_for_label }}" class="form-label">Téléphone 1</label>
                        {{ form.phone_number_1 }}
                    </div>
                    
                    <div class="mb-3">
                        <label for="{{ form.phone_number_2.id_for_label }}" class="form-label">Téléphone 2</label>
                        {{ form.phone_number_2 }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Enregistrer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
