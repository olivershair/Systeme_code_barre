<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestion Étiquettes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --violet-primary: #6f2c91;
            --violet-dark: #5a2475;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .login-header {
            background-color: var(--violet-primary);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 30px;
            text-align: center;
        }
        
        .btn-primary {
            background-color: var(--violet-primary);
            border-color: var(--violet-primary);
        }
        
        .btn-primary:hover {
            background-color: var(--violet-dark);
            border-color: var(--violet-dark);
        }
        
        .form-control:focus {
            border-color: var(--violet-primary);
            box-shadow: 0 0 0 0.25rem rgba(111, 44, 145, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card">
                    <div class="login-header">
                        <h3 class="mb-0">🏷️ Gestion Étiquettes</h3>
                        <p class="mb-0 mt-2">Connexion</p>
                    </div>
                    <div class="card-body p-5">
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                        
                        {% if form.errors %}
                            <div class="alert alert-danger">
                                Nom d'utilisateur ou mot de passe incorrect.
                            </div>
                        {% endif %}
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="username" class="form-label">Nom d'utilisateur</label>
                                <input type="text" name="username" id="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Mot de passe</label>
                                <input type="password" name="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                Se connecter
                            </button>
                        </form>
                    </div>
                </div>
                <p class="text-center text-white mt-3">
                    <small>&copy; 2024 Système de Gestion d'Étiquettes</small>
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
